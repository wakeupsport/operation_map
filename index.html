<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ops Map Dashboard VN</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { margin:0; }
#vnMap path {
  stroke: #555;
  stroke-width: 0.4;
  cursor: pointer;
  transition: fill 0.2s;
}
.north { fill: #8bc34a; }
.central { fill: #ffeb3b; }
.south { fill: #ff9800; }
.active { fill: #1565c0 !important; }
.tooltip {
  position: absolute;
  background: #222;
  color: #fff;
  padding: 3px 6px;
  border-radius: 4px;
  font-size: 12px;
  pointer-events: none;
  display: none;
}
</style>
</head>
<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- MAP -->
  <div class="w-1/2 p-4 bg-white overflow-auto relative">
    <h2 class="text-xl font-bold mb-2">🗺️ Bản đồ Việt Nam - 63 tỉnh</h2>
    <svg id="vnMap" viewBox="0 0 1200 2349" style="width:100%;height:auto;">
      <!-- SVG 63 tỉnh -->
      <!-- Thay toàn bộ <path> ở đây bằng file SVG gốc 63 tỉnh -->
      <!-- Ví dụ demo: 2 tỉnh (thay thế bằng 63 tỉnh thật) -->
      <path id="ha_noi" class="north" d="M581 203 L589 212 L578 231 Z" onmouseover="showTooltip(evt,'Hà Nội')" onmouseout="hideTooltip()"></path>
      <path id="ho_chi_minh" class="south" d="M580 1800 L588 1812 L577 1828 Z" onmouseover="showTooltip(evt,'Hồ Chí Minh')" onmouseout="hideTooltip()"></path>
      <!-- END demo -->
    </svg>
    <div id="tooltip" class="tooltip"></div>
  </div>

  <!-- INFO PANEL -->
  <div class="w-1/2 p-4 overflow-y-auto">
    <input id="search" placeholder="🔍 Tìm tỉnh..." class="w-full p-2 border mb-3 rounded"/>
    <div class="flex gap-2 mb-3">
      <button onclick="setFilter('all')" class="btn">All</button>
      <button onclick="setFilter('hotel')" class="btn">Hotel</button>
      <button onclick="setFilter('food')" class="btn">Food</button>
      <button onclick="setFilter('post')" class="btn">Post</button>
      <button onclick="setFilter('car_rental')" class="btn">Car</button>
    </div>
    <h2 id="provinceName" class="text-xl font-bold mb-2">Chọn tỉnh</h2>
    <div id="data"></div>
  </div>

</div>

<script>
// GOOGLE SHEET CSV
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTHAfXwcrhnhMDq0pgLjdrnIZf8f8xn01kPoKNxDoMTqph4coCQPIe67vcixVmPIjAdE6AV73jMXfh/pub?output=csv";

let rawData = [];
let currentProvince = "";
let currentFilter = "all";

fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);
    rawData = rows.map(r => {
      const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      return {
        province_id: cols[0],
        province_name: cols[1],
        type: cols[2],
        name: cols[3],
        address: cols[4],
        phone: cols[5],
        map_link: cols[6],
        note: cols[7]
      };
    });
    initMapClicks();
  });

function initMapClicks() {
  document.querySelectorAll("#vnMap path").forEach(p => {
    p.addEventListener("click", () => {
      document.querySelectorAll("#vnMap path").forEach(x => x.classList.remove("active"));
      p.classList.add("active");
      currentProvince = p.id;
      renderData();
    });
  });
}

// Filter
function setFilter(type) {
  currentFilter = type;
  renderData();
}

// Render data panel
function renderData() {
  let data = rawData.filter(d => d.province_id === currentProvince);
  if (currentFilter !== "all") data = data.filter(d => d.type === currentFilter);

  const nameEl = document.getElementById("provinceName");
  const container = document.getElementById("data");
  container.innerHTML = "";

  if (!data.length) {
    nameEl.innerText = "Không có dữ liệu";
    return;
  }

  nameEl.innerText = data[0].province_name;
  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "bg-white p-3 mb-2 rounded shadow";
    div.innerHTML = `
      <b>${item.name}</b><br>
      ${item.address}<br>
      ${item.phone || ""}<br>
      <a href="${item.map_link}" target="_blank" class="text-blue-500">📍 Map</a><br>
      <i>${item.note || ""}</i>
    `;
    container.appendChild(div);
  });
}

// Tooltip
const tooltip = document.getElementById("tooltip");
function showTooltip(evt, text) {
  tooltip.style.display = "block";
  tooltip.innerText = text;
  moveTooltip(evt);
}
function hideTooltip() {
  tooltip.style.display = "none";
}
function moveTooltip(evt) {
  tooltip.style.left = evt.pageX + 10 + "px";
  tooltip.style.top = evt.pageY + 10 + "px";
}
document.addEventListener("mousemove", moveTooltip);

</script>
</body>
</html>
