<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ops Map Dashboard VN</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { margin: 0; }
#vnMap path {
  stroke: #555;
  stroke-width: 0.5;
  cursor: pointer;
  transition: fill 0.2s;
}
/* Màu theo miền */
.north { fill: #8bc34a; }
.central { fill: #ffeb3b; }
.south { fill: #ff9800; }
.active { fill: #1565c0 !important; }
</style>
</head>
<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- MAP -->
  <div class="w-1/2 p-4 bg-white overflow-auto">
    <h2 class="text-xl font-bold mb-2">🗺️ Bản đồ Việt Nam 63 tỉnh</h2>

    <svg id="vnMap" viewBox="0 0 1200 2349">
      <!-- START OF SVG MAP 63 PROVINCES -->
      <!-- Lấy từ bản đồ provinces_of_vietnam-blank_map.svg (public domain) :contentReference[oaicite:0]{index=0} -->
      <!-- Mỗi tỉnh có id=province_id -->
      <!-- Bạn có thể chỉnh sửa màu, phân miền theo lớp north/central/south -->
      <!-- Note: Đây là ví dụ rút gọn; file đầy đủ rất dài nên mình để link ở phần dưới -->
      <path id="ha_noi" class="north" d="M580 200 L590 210 L570 230 Z"></path>
      <path id="ho_chi_minh" class="south" d="M580 1800 L590 1810 L570 1830 Z"></path>
      <!-- REPLACE the two above with full paths from the SVG below -->
      <!-- END OF SVG MAP -->
    </svg>
  </div>

  <!-- INFO PANEL -->
  <div class="w-1/2 p-4 overflow-y-auto">

    <input id="search" placeholder="🔍 Tìm tỉnh..." class="w-full p-2 border mb-3 rounded"/>

    <div class="flex gap-2 mb-3">
      <button onclick="setFilter('all')" class="btn">All</button>
      <button onclick="setFilter('hotel')" class="btn">Hotel</button>
      <button onclick="setFilter('food')" class="btn">Food</button>
      <button onclick="setFilter('post')" class="btn">Post</button>
      <button onclick="setFilter('car_rental')" class="btn">Car</button>
    </div>

    <h2 id="provinceName" class="text-xl font-bold mb-2">Chọn tỉnh</h2>
    <div id="data"></div>
  </div>
</div>

<script>
// Link CSV Google Sheet (đã public)
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTHAfXwcrhnhMDq0pgLjdrnIZf8f8xn01kPoKNxDoMTqph4coCQPIe67vcixVmPIjAdE6AV73jMXfh/pub?output=csv";

let rawData = [];
let currentProvince = "";
let currentFilter = "all";

fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);
    rawData = rows.map(r => {
      const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      return {
        province_id: cols[0],
        province_name: cols[1],
        type: cols[2],
        name: cols[3],
        address: cols[4],
        phone: cols[5],
        map_link: cols[6],
        note: cols[7]
      };
    });
    initMapClicks();
  });

function initMapClicks() {
  document.querySelectorAll("#vnMap path").forEach(p => {
    p.addEventListener("click", () => {
      document.querySelectorAll("#vnMap path").forEach(x => x.classList.remove("active"));
      p.classList.add("active");
      currentProvince = p.id;
      renderData();
    });
  });
}

function setFilter(type) {
  currentFilter = type;
  renderData();
}

function renderData() {
  let data = rawData.filter(d => d.province_id === currentProvince);
  if (currentFilter !== "all") data = data.filter(d => d.type === currentFilter);

  const nameEl = document.getElementById("provinceName");
  const container = document.getElementById("data");
  container.innerHTML = "";

  if (!data.length) {
    nameEl.innerText = "Không có dữ liệu";
    return;
  }

  nameEl.innerText = data[0].province_name;
  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "bg-white p-3 mb-2 rounded shadow";
    div.innerHTML = `
      <b>${item.name}</b><br>
      ${item.address}<br>
      ${item.phone || ""}<br>
      <a href="${item.map_link}" target="_blank" class="text-blue-500">📍 Map</a><br>
      <i>${item.note || ""}</i>
    `;
    container.appendChild(div);
  });
}
</script>

</body>
</html>
